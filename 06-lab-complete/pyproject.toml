[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "B"]

[tool.coverage.run]
source = ["app"]
branch = true
omit = ["app/static/*"]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 55

[tool.coverage.xml]
output = "coverage.xml"
