services:
  - type: web
    name: day12-production-agent
    runtime: docker
    region: singapore
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_NAME
        value: Production Helpdesk Agent
      - key: APP_VERSION
        value: "2.0.0"
      - key: AGENT_SOURCE
        value: VinUni Day 9 CS + IT Helpdesk Supervisor-Worker
      - key: AGENT_API_KEY
        generateValue: true
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: REDIS_URL
        sync: false
