name: Day 12 CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: day12-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify production agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 06-lab-complete
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: 06-lab-complete/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Compile Python source
        run: python -m compileall app

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run production readiness checker
        run: python check_production_ready.py

      - name: Build Docker image
        run: docker build -t day12-helpdesk-agent:${{ github.sha }} .

  deploy-render:
    name: Deploy to Render
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not configured; Render auto-deploy can handle this commit."
            exit 0
          fi
          curl --fail --show-error --silent --request POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deployment triggered."
