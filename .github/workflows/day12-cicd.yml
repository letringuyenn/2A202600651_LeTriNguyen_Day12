name: Day 12 Parts 03-05 CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: day12-${{ github.ref }}
  cancel-in-progress: true

jobs:
  part-03-cloud:
    name: "Part 03: Cloud & Docker"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Docker Compose
        working-directory: 06-lab-complete
        run: |
          cp .env.example .env
          docker compose config --quiet

      - name: Build production image
        working-directory: 06-lab-complete
        run: docker build -t day12-helpdesk-agent:${{ github.sha }} .

  part-04-security:
    name: "Part 04: API Gateway & Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: 06-lab-complete/requirements.txt

      - name: Install dependencies
        working-directory: 06-lab-complete
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Lint production code
        working-directory: 06-lab-complete
        run: ruff check app tests

      - name: Run unit tests with coverage
        working-directory: 06-lab-complete
        run: |
          coverage run -m unittest discover -s tests -p "test_*.py" -v
          coverage report
          coverage xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: day12-coverage-report
          path: 06-lab-complete/coverage.xml
          if-no-files-found: error

  part-05-reliability:
    name: "Part 05: Scaling & Reliability"
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: 06-lab-complete/requirements.txt

      - name: Install dependencies
        working-directory: 06-lab-complete
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run live API flow with Redis
        working-directory: 06-lab-complete
        run: python tests/integration_flow.py

      - name: Run production readiness checker
        working-directory: 06-lab-complete
        run: python check_production_ready.py

  deploy-render:
    name: Deploy to Render
    needs: [part-03-cloud, part-04-security, part-05-reliability]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "No deploy hook configured; Render Blueprint auto-deploy handles main."
            exit 0
          fi
          curl --fail --show-error --silent --request POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deployment triggered."

      - name: Wait for Render deployment
        env:
          DEPLOYED_URL: ${{ vars.RENDER_SERVICE_URL || 'https://day12-helpdesk-agent.onrender.com' }}
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error "$DEPLOYED_URL/health" > health.json; then
              cat health.json
              exit 0
            fi
            echo "Waiting for Render deployment ($attempt/30)..."
            sleep 10
          done
          echo "Render health check did not become ready."
          exit 1

      - name: Demo deployed endpoints
        env:
          DEPLOYED_URL: ${{ vars.RENDER_SERVICE_URL || 'https://day12-helpdesk-agent.onrender.com' }}
        run: |
          curl --fail --silent --show-error "$DEPLOYED_URL/health"
          echo
          curl --fail --silent --show-error "$DEPLOYED_URL/ready"
          echo
          curl --fail --silent --show-error "$DEPLOYED_URL/" | grep --quiet "Relay Desk"
          {
            echo "## CD deployment demo"
            echo "- Public URL: $DEPLOYED_URL"
            echo "- Health endpoint: passed"
            echo "- Readiness endpoint: passed"
            echo "- Demo HTML UI: passed"
          } >> "$GITHUB_STEP_SUMMARY"
